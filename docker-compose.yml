version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: cxwell_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-cxwell_db}
      MYSQL_USER: ${DB_USER:-cxwell_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-cxwell_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cxwell_backend
    restart: always
    environment:
      DATABASE_URL: mysql://${DB_USER:-cxwell_user}:${DB_PASSWORD:-cxwell_password}@db:3306/${DB_NAME:-cxwell_db}
      JWT_SECRET: ${JWT_SECRET:-secret}
      PORT: 3000
    depends_on:
      - db
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cxwell_frontend
    restart: always
    environment:
      - VITE_ALLOWED_HOSTS=${VITE_ALLOWED_HOSTS:-jlxayywgrwee.sealosbja.site}
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
