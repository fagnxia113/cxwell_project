version: '3.8'

# ============================================================
# 文件存储配置说明
# ============================================================
# 方案一：本地磁盘存储（默认）
#   STORAGE_TYPE=local 或不设置
#   上传文件存储在主机 ./data/uploads/ 目录
#
# 方案二：阿里云 OSS 对象存储
#   STORAGE_TYPE=oss
#   需要配置以下环境变量：
#     - OSS_REGION: OSS 地域，如 oss-cn-hangzhou
#     - OSS_BUCKET: Bucket 名称
#     - OSS_ACCESS_KEY_ID: 阿里云 AccessKey ID
#     - OSS_ACCESS_KEY_SECRET: 阿里云 AccessKey Secret
#     - FILE_URL_PREFIX: 改为 OSS 域名，如 https://bucket.oss-cn-hangzhou.aliyuncs.com
#
# 切换步骤：
#   1. 在阿里云 OSS 控制台创建 Bucket
#   2. 创建 AccessKey 并记录 ID 和 Secret
#   3. 修改下方环境变量
#   4. 重启服务：docker compose down && docker compose up -d
# ============================================================

services:
  db:
    image: mysql:8.0
    container_name: cxwell_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-cxwell_db}
      MYSQL_USER: ${DB_USER:-cxwell_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-cxwell_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cxwell_backend
    restart: always
    environment:
      DATABASE_URL: mysql://${DB_USER:-cxwell_user}:${DB_PASSWORD:-cxwell_password}@db:3306/${DB_NAME:-cxwell_db}
      JWT_SECRET: ${JWT_SECRET:-secret}
      PORT: 3000
      # ---- 文件存储配置 ----
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      UPLOAD_PATH: ${UPLOAD_PATH:-./uploads}
      FILE_URL_PREFIX: ${FILE_URL_PREFIX:-/api/files}
      # ---- 阿里云 OSS 配置 ----
      OSS_REGION: ${OSS_REGION:-}
      OSS_BUCKET: ${OSS_BUCKET:-}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_INTERNAL: ${OSS_INTERNAL:-true}
      # ---- 钉钉配置 ----
      DINGTALK_APP_KEY: ${DINGTALK_APP_KEY:-}
      DINGTALK_APP_SECRET: ${DINGTALK_APP_SECRET:-}
      DINGTALK_AGENT_ID: ${DINGTALK_AGENT_ID:-}
      # ---- 前端地址（用于钉钉消息跳转）----
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    depends_on:
      - db
    ports:
      - "3000:3000"
    # 本地存储时使用 bind mount
    # OSS 存储时可以注释掉这行
    volumes:
      - ./data/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cxwell_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
